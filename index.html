<!DOCTYPE html>
<html lang="en" dir="ltr" xmlns:v="urn:schemas-microsoft-com:vml" xmlns:o="urn:schemas-microsoft-com:office:office">
<head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <!--[if !mso]><!-- -->
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <!--<![endif]-->
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=yes">
  <meta name="format-detection" content="telephone=no, date=no, address=no, email=no, url=no">
  <meta name="x-apple-disable-message-reformatting">
  <meta name="color-scheme" content="light dark">
  <meta name="supported-color-schemes" content="light dark">
  <link href="https://fonts.googleapis.com/css2?family=PT+Serif:ital,wght@0,400,450;0,700;1,400;1,700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:ital,wght@0,100..700;1,100..700&family=PT+Serif:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">

  <title>Scentbird Drift Email Template</title>
  <!--[if mso]>
  <noscript>
    <xml>
      <o:OfficeDocumentSettings>
        <o:PixelsPerInch>96</o:PixelsPerInch>
      </o:OfficeDocumentSettings>
    </xml>
  </noscript>
  <![endif]-->
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Josefin+Sans:ital,wght@0,100..700;1,100..700&family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=PT+Serif:ital,wght@0,400;0,700;1,400;1,700&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap');
    :root {
      color-scheme: light dark;
      supported-color-schemes: light dark;
    }
     @font-face { 
        font-family: 'PT Serif'; 
        font-style: normal; 
        font-weight: 400; 
        src: url('https://fonts.googleapis.com/css2?family=PT+Serif:ital,wght@0,400,450;0,700;1,400;1,700&display=swap');
    }
    @font-face { 
        font-family: 'Josefin Sans'; 
        font-style: normal; 
        font-weight: 450; 
        src: url('https://fonts.googleapis.com/css2?family=Josefin+Sans:ital,wght@0,100..700;1,100..700&family=PT+Serif:ital,wght@0,400;0,700;1,400;1,700&display=swap');
    }
    /* General Reset */
    body {
        margin: 0;
        padding: 0;
        width: 100% !important;
        -webkit-text-size-adjust: 100%;
        -ms-text-size-adjust: 100%;
    }

    /* Image Reset */
    img {
        border: 0;
        height: auto;
        line-height: 100%;
        outline: none;
        text-decoration: none;
        display: block; 
    }
    /* Table Reset */
    table, td {
        border-collapse: collapse !important;
        margin: 0 auto;
        mso-table-lspace: 0pt;
        mso-table-rspace: 0pt;
    }
    /* Link Reset */
    a {
        text-decoration: none;
    }
     /* iOS blue links fix */
    a[x-apple-data-detectors] {
      color: inherit !important;
      text-decoration: none !important;
    }
    /* Reusable classes */    
    .h1_font {
        font-family: 'PT Serif', Courier, monospace;
    }
    .p_font {
        font-family:'Josefin Sans', Verdana, Geneva, Tahoma, sans-serif;
    }
    @media screen and (max-width: 600px) {
      .container {
        width: 100% !important;
      }

      .stack {
        display: block !important;
        width: 100% !important;
      }

      .padding {
        padding: 20px !important;
      }

      .text-center {
        text-align: center !important;
      }
    }
  </style>
</head>
<body>
  <div role="article" aria-roledescription="email" aria-label="Drift Email Template" lang="en" dir="ltr">
     <!-- Wrapper -->
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" bgcolor="#f4f4f4" style="width: 100%;">
    <tr>
      <td align="center">

        <!-- Container -->
        <table role="presentation" width="600" cellpadding="0" cellspacing="0" border="0" class="container" style="width:600px; max-width:600px; background-color:#ffffff;">

          <!-- HEADER -->
          <tr>
            <td align="left" style="padding:20px;">
              <img src="https://via.placeholder.com/150x50" width="150" alt="Logo">
            </td>
          </tr>

          <!-- HERO -->
          <tr>
            <td>
              <img src="https://via.placeholder.com/600x300" width="600" alt="Hero Image" style="width:100%; max-width:600px;">
            </td>
          </tr>

          <!-- CONTENT -->
          <tr>
            <td class="padding" style="padding:30px; font-family: Arial, sans-serif; font-size:16px; line-height:1.5; color:#333333;">
              <p style="margin:0 0 15px;">Hello,</p>
              <p style="margin:0 0 15px;">
                This is a sample responsive email template. You can replace this content with your own.
              </p>
            </td>
          </tr>

          <!-- BUTTON -->
          <tr>
            <td align="center" style="padding:20px;">
              
              <!--[if mso]>
              <v:roundrect xmlns:v="urn:schemas-microsoft-com:vml" href="#" style="height:45px;v-text-anchor:middle;width:200px;" arcsize="10%" stroke="f" fillcolor="#007BFF">
                <w:anchorlock/>
                <center style="color:#ffffff;font-family:sans-serif;font-size:16px;">
                  Call to Action
                </center>
              </v:roundrect>
              <![endif]-->

              <!--[if !mso]><!-- -->
              <a href="#" style="display:inline-block; background-color:#007BFF; color:#ffffff; text-decoration:none; padding:12px 24px; font-family:Arial, sans-serif; font-size:16px; border-radius:4px;">
                Call to Action
              </a>
              <!--<![endif]-->

            </td>
          </tr>

          <!-- FOOTER -->
          <tr>
            <td style="padding:20px; font-family: Arial, sans-serif; font-size:12px; color:#999999; text-align:center;">
              © 2026 Company Name. All rights reserved.
            </td>
          </tr>

        </table>

      </td>
    </tr>
  </table>

  </div>
</body>
</html>
