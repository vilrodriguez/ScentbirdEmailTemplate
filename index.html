  <style>
    @import url('https://fonts.googleapis.com/css2?family=Josefin+Sans:ital,wght@0,100..700;1,100..700&family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=PT+Serif:ital,wght@0,400;0,700;1,400;1,700&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap');
    :root {
      color-scheme: light dark;
      supported-color-schemes: light dark;
    }
     @font-face { 
        font-family: 'PT Serif'; 
        font-style: normal; 
        font-weight: 400; 
        src: url('https://fonts.googleapis.com/css2?family=PT+Serif:ital,wght@0,400,450;0,700;1,400;1,700&display=swap');
    }
    @font-face { 
        font-family: 'Josefin Sans'; 
        font-style: normal; 
        font-weight: 450; 
        src: url('https://fonts.googleapis.com/css2?family=Josefin+Sans:ital,wght@0,100..700;1,100..700&family=PT+Serif:ital,wght@0,400;0,700;1,400;1,700&display=swap');
    }
    /* General Reset */
    body {
        margin: 0;
        padding: 0;
        width: 100% !important;
        -webkit-text-size-adjust: 100%;
        -ms-text-size-adjust: 100%;
    }

    /* Image Reset */
    img {
        border: 0;
        height: auto;
        line-height: 100%;
        outline: none;
        text-decoration: none;
        display: block; 
    }
    /* Table Reset */
    table, td {
        border-collapse: collapse !important;
        mso-table-lspace: 0pt;
        mso-table-rspace: 0pt;
    }
    /* Link Reset */
    a {
        text-decoration: none;
    }
    /* Reusable classes */    
    .h1_font {
        font-family: 'PT Serif', Courier, monospace;
    }
    .p_font {
        font-family:'Josefin Sans', Verdana, Geneva, Tahoma, sans-serif;
    }
  </style>
</head>
<body>
  <div role="article" aria-roledescription="email" aria-label="email name" lang="en" dir="ltr" style="">
    <table>
        <tr>
            <td class="h1_font" style="font-size: 50px; letter-spacing: -3%; line-height: 140%; font-weight: 420;">
                Ready in <em><b>seconds</b></em>
            </td>
            
        </tr>
        <tr>
            
            <td class="p_font" style="font-size: 22px; letter-spacing: -3%; line-height: 140%; font-weight: 420;">
                Go from 0 to 100 in an instant—the Wood Car Freshener is easy to assemble, and even easier to enjoy.
            </td>
        </tr>
    </table>
  </div>
