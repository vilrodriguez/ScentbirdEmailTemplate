    /* General Reset */
    body {
        margin: 0;
        padding: 0;

    }

    img {
        border: 0;
        height: auto;
        line-height: 100%;
        outline: none;

        display: block; 
    }

    table, td {
        border-collapse: collapse !important;

        mso-table-lspace: 0pt;

    a {
        text-decoration: none;

  <div role="article" aria-roledescription="email" aria-label="Drift Email Template" lang="en" dir="ltr">

    <tr>
      <td align="center">

        <table role="presentation" width="600" cellpadding="0" cellspacing="0" border="0" class="container" style="width:600px; max-width:600px; background-color:#ffffff;">

          <!-- HEADER LOGO AND LINK MENU-->
           <tr> 
            <td align="center" bgcolor="#221F20" style="background-color:#221F20; padding-top: 44px; padding-left: 72px; padding-right: 72px;">
                <table role="presentation" align="center" width="100%" cellpadding="0" cellspacing="0" border="0" style="width: 100%;">
                        <td style="text-align: center;">
                            <tr>
                                <a href="https://drift.co/" target="_blank">
                                    <img src="https://i.ibb.co/7NK1kSX8/drift-logo.png" width="131" alt="Drift logo" style="text-align: center;">
                                </a>
                            </tr>
                            <tr>
                                <td class="padding_bottom_22px padding_bottom_12px_resp" style="padding-top: 28px;">
                                    <table role="presentation" align="center" bgcolor="" width="100%" cellpadding="0" cellspacing="0" border="0" style="width: 100%;">
                                        <td bgcolor="" class="stack padding_bottom_10px_resp text_color_light" style="text-align: center;" >
                                            <a href="https://drift.co/" target="_blank" class="text_color_light header_link_style">SHOP ALL</a>
                                        </td>
                                        <td bgcolor="" class="stack padding_bottom_10px_resp text_color_light" style="text-align: center; " >
                                            <a href="https://drift.co/" target="_blank" class="text_color_light header_link_style">CAR</a>
                                        </td>
                                        <td bgcolor="" class="stack padding_bottom_10px_resp text_color_light" style="text-align: center;">
                                            <a href="https://drift.co/" target="_blank" class="text_color_light header_link_style">HOME</a>
                                        </td>
                                        <td bgcolor="" class="stack padding_bottom_10px_resp text_color_light" style="text-align: center;">
                                            <a href="https://drift.co/" target="_blank" class="text_color_light header_link_style">SCENT OF THE MONTH</a>
                                        </td>
                                    </table>
                                </td>
                            </tr>
                        </td>
                </table>             
            </td>
          </tr>
          <!-- DIVIDER -->
          <tr>
            <td style="height: 80px; width: 100%; background-color: rebeccapurple;">
              
            </td>
          </tr>

          <!-- HERO SECTION-->
          <tr>
            <td>
                <a href="https://drift.co/account/" target="_blank">
                    <img src="https://i.ibb.co/5ggXMRvr/hero-image-clip.png" width="600" alt="Hero Image" style="width:100%; max-width:600px;">
                </a>
            </td>
          </tr>

          <!-- CONTENT -->
          <tr>
            <td class="padding" style="padding:30px; font-family: Arial, sans-serif; font-size:16px; line-height:1.5; color:#333333;">
              <p style="margin:0 0 15px;">Hello,</p>
              <p style="margin:0 0 15px;">
                This is a sample responsive email template. You can replace this content with your own.
              </p>
            </td>
          </tr>

          <!-- BUTTON -->
          <tr>
            <td align="center" style="padding:20px;">
